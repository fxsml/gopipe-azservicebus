services:
  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    platform: linux/amd64 # Emulator is x64 only (works on Apple Silicon via Rosetta)
    depends_on:
      sql:
        condition: service_healthy
    environment:
      - ACCEPT_EULA=Y
      - ASPNETCORE_URLS=http://0.0.0.0:5678
      - ServiceBus__ConfigPath=/app/config
      - ServiceBus__SqlConnectionString=Server=sql,1433;Database=master;User Id=sa;Password=Your_password123!;TrustServerCertificate=true;Encrypt=false
      - ServiceBus__EnableMessageBrowser=true
    ports:
      - "5678:5678"  # HTTP endpoint
      - "5671:5671"  # AMQP over TLS
      - "5672:5672"  # AMQP
    volumes:
      - ./config:/app/config:ro
    networks:
      - servicebus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  sql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: servicebus-sql
    platform: linux/arm64  # Use ARM64 for Apple Silicon (x64 on Intel Macs)
    environment:
      - ACCEPT_EULA=1
      - MSSQL_SA_PASSWORD=Your_password123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    networks:
      - servicebus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sqlservr > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 40s
    volumes:
      - sql-data:/var/opt/mssql

networks:
  servicebus-network:
    driver: bridge

volumes:
  sql-data:
